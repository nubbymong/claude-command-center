name: CI

on:
  pull_request:
    branches: [main, beta]
  push:
    branches: [main, beta]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      - name: Rebuild native modules
        shell: bash
        run: |
          node -e "
          const { rebuild } = require('@electron/rebuild');
          rebuild({
            buildPath: process.cwd(),
            electronVersion: require('./node_modules/electron/package.json').version,
            onlyModules: ['node-pty', 'better-sqlite3']
          }).then(() => console.log('rebuild done')).catch(e => { console.error(e); process.exit(1) })
          "

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

      # Beta-testing artifact pipeline.
      # When a PR's source branch starts with `release/` we also produce
      # platform installers and upload them as workflow artifacts so the
      # PR's Actions run page becomes the download point for each iteration
      # of a release candidate. Signing/notarisation are skipped here —
      # CI lacks the Apple Developer ID secrets the formal release workflow
      # uses, so the macOS DMG is unsigned and Gatekeeper will warn on
      # first launch (right-click → Open). The Windows installer is also
      # unsigned, same SmartScreen warning as the release pipeline.
      - name: Package Windows installer (release/* branches only)
        if: matrix.os == 'windows-latest' && startsWith(github.head_ref, 'release/')
        run: npx electron-builder --win

      - name: Package macOS DMG (release/* branches only)
        if: matrix.os == 'macos-latest' && startsWith(github.head_ref, 'release/')
        run: npx electron-builder --mac

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest' && startsWith(github.head_ref, 'release/')
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.sha }}
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS DMG
        if: matrix.os == 'macos-latest' && startsWith(github.head_ref, 'release/')
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 14
