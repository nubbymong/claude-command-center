name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: "What problem does this solve, or what workflow would it improve?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "Describe what you'd like to see"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any workarounds or alternative approaches you've thought about"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Sessions & Configs
        - SSH / Remote
        - Command Bar
        - Cloud Agents / Teams
        - Vision / Browser
        - Tokenomics
        - Memory Visualizer
        - Insights
        - Statusline
        - UI / Navigation
        - Other
    validations:
      required: true
